<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>포라이트 정산 조회 (화주용)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="date"], select { font-size: 16px !important; }
        .modal-scroll::-webkit-scrollbar { width: 4px; }
        .modal-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 p-2 sm:p-6 md:p-10">

    <div id="appContent">
        <div id="cloudStatus" class="fixed top-0 left-0 w-full bg-indigo-600 text-white text-[10px] font-bold text-center py-1 z-50">
            ☁️ 포라이트 정산 데이터 조회 중...
        </div>

        <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200 mt-4">
            <div class="px-6 py-6 bg-slate-900 text-white flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight">🏭 FORLIGHT <span class="text-indigo-400">정산 조회</span></h1>
                    <p class="text-slate-400 text-xs mt-1 font-medium">B2B 파렛트 물류 정산 내역</p>
                </div>
                <div class="text-right">
                    <span class="bg-slate-700 text-slate-200 px-3 py-1 rounded-full text-[11px] font-bold border border-slate-600">👁️ 화주 조회용</span>
                </div>
            </div>

            <div class="p-4 sm:p-8">
                <div class="bg-slate-800 rounded-xl p-6 mb-8 text-white shadow-md relative overflow-hidden">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-3 relative z-10">
                        <h2 class="text-lg font-bold flex items-center gap-2">📊 월별 정산 요약</h2>
                        <select id="monthSelector" onchange="handleMonthChange()" class="bg-slate-700 text-white border border-slate-600 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer"></select>
                    </div>

                    <div class="mb-8 relative z-10">
                        <p class="text-slate-400 text-xs font-bold mb-1">선택한 월 합산 매출액</p>
                        <div class="text-3xl font-black text-indigo-400"><span id="monthlyTotalRevenue">0</span> <span class="text-lg font-medium text-white opacity-60">원</span></div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 relative z-10">
                        <div onclick="openStorageModal()" class="bg-white/10 hover:bg-white/20 p-4 rounded-lg border border-white/10 transition cursor-pointer group">
                            <p class="text-xs text-slate-300 font-bold mb-2 flex justify-between">📦 보관료 (900원/일) <span class="group-hover:text-indigo-300">🔍</span></p>
                            <p class="text-lg font-bold"><span id="monthlyStorageFee">0</span> 원</p>
                        </div>
                        <div onclick="openInOutModal('OUT')" class="bg-white/10 hover:bg-white/20 p-4 rounded-lg border border-white/10 transition cursor-pointer group">
                            <p class="text-xs text-slate-300 font-bold mb-2 flex justify-between">🚚 출고비 (자체/쿠팡) <span class="group-hover:text-indigo-300">🔍</span></p>
                            <p class="text-lg font-bold"><span id="monthlyOutFee">0</span> 원</p>
                        </div>
                        <div onclick="openInOutModal('IN')" class="bg-white/10 hover:bg-white/20 p-4 rounded-lg border border-white/10 transition cursor-pointer group">
                            <p class="text-xs text-slate-300 font-bold mb-2 flex justify-between">📥 입고비 (40ft HC) <span class="group-hover:text-indigo-300">🔍</span></p>
                            <p class="text-lg font-bold"><span id="monthlyInFee">0</span> 원</p>
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-end mb-3">
                    <h3 class="text-lg font-bold text-slate-800">📋 실시간 B2B 재고 현황 <span class="text-xs font-normal text-slate-400">(규격: 1PLT = 120개)</span></h3>
                    <span class="text-xs font-bold bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full border border-indigo-100" id="todayPltBadge">정산 계산중...</span>
                </div>
                <div class="overflow-x-auto mb-8">
                    <table class="w-full border-collapse bg-white border rounded-lg shadow-sm">
                        <thead>
                            <tr class="bg-slate-800 text-white text-sm">
                                <th class="p-3 text-left">품목명</th>
                                <th class="p-3 text-center">현재고 (PLT)</th>
                                <th class="p-3 text-center">현재고 (낱개)</th>
                                <th class="p-3 text-center text-amber-400">정산 보관료 적용 (PLT)</th>
                                <th class="p-3 text-center text-red-400">누적 KPP 미수</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTable" class="divide-y divide-slate-100 text-center"></tbody>
                    </table>
                </div>

                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-3 gap-2">
                    <h3 class="text-lg font-bold text-slate-800">🔍 <span id="logTitleMonth" class="text-indigo-600"></span> 상세 내역</h3>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <input type="date" id="searchDate" onchange="render()" class="text-xs p-2 border border-slate-300 rounded flex-1 outline-none">
                        <button onclick="document.getElementById('searchDate').value=''; render()" class="text-xs bg-slate-200 px-3 py-2 rounded font-bold hover:bg-slate-300">전체보기</button>
                    </div>
                </div>
                <div id="logContainer" class="space-y-2 max-h-96 overflow-y-auto pr-1"></div>
            </div>
        </div>
    </div>

    <div id="detailModal" style="display:none;" class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-3">
        <div class="bg-white rounded-xl w-full max-w-md shadow-2xl overflow-hidden">
            <div class="p-5 border-b flex justify-between items-center">
                <h2 id="modalTitle" class="text-lg font-bold text-slate-800">상세 내역</h2>
                <button onclick="closeModal()" class="text-slate-500 font-bold text-xl">&times;</button>
            </div>
            <div class="p-4 max-h-[60vh] overflow-y-auto modal-scroll">
                <table class="w-full text-sm text-left">
                    <thead class="text-xs text-slate-500 bg-slate-50 border-b">
                        <tr><th class="p-2">일시</th><th class="p-2">내용</th><th class="p-2 text-right">금액</th></tr>
                    </thead>
                    <tbody id="modalBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
            <div class="p-4 bg-slate-50 flex justify-end">
                <button onclick="closeModal()" class="bg-slate-800 text-white px-6 py-2 rounded font-bold">확인</button>
            </div>
        </div>
    </div>

    <script>
        // ===== 화주 조회 전용 (읽기 전용) - 서버 쓰기/수정 기능 일절 없음 =====
        const FIREBASE_URL = "https://ts3pl-982ef-default-rtdb.firebaseio.com/forlight_data.json";

        let inventory = [], logs = [], dailyPltLog = {}, manualStorageLog = {};
        let currentMonth = getFormattedDate().substring(0, 7);

        document.addEventListener("DOMContentLoaded", fetchData);

        function getFormattedDate() {
            const t = new Date();
            return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
        }

        function handleMonthChange() { currentMonth = document.getElementById('monthSelector').value; render(); }

        function fetchData() {
            fetch(FIREBASE_URL + "?t=" + new Date().getTime()).then(res => res.json()).then(data => {
                if(data) {
                    inventory = data.inventory || [];
                    logs = data.logs || [];
                    dailyPltLog = data.dailyPltLog || {};
                    manualStorageLog = data.manualStorageLog || {};
                }
                // 오늘 자 스냅샷이 없으면 현재고 기준으로 메모리상 생성 (저장 안 함)
                const todayStr = getFormattedDate();
                if (inventory[0] && (dailyPltLog[todayStr] === undefined || dailyPltLog[todayStr] === null)) {
                    dailyPltLog[todayStr] = Math.ceil(((inventory[0].plt * 120) + (inventory[0].pcs || 0)) / 120);
                }
                currentMonth = todayStr.substring(0, 7);
                document.getElementById('cloudStatus').innerText = "🟢 정산 데이터 조회 완료";
                document.getElementById('cloudStatus').className = "fixed top-0 left-0 w-full bg-emerald-500 text-white text-[10px] font-bold text-center py-1 z-50";
                render();
            }).catch(e => {
                document.getElementById('cloudStatus').innerText = "🔴 통신 오류 발생 (인터넷 확인)";
                document.getElementById('cloudStatus').className = "fixed top-0 left-0 w-full bg-red-500 text-white text-[10px] font-bold text-center py-1 z-50";
            });
        }

        // 관리자용/대시보드와 동일한 보관료 계산 (변경 없음)
        function buildDailyStorage(month) {
            const series = {};
            const [year, mon] = month.split('-').map(Number);
            const today = new Date();
            const todayMonthStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
            const lastDayOfMonth = new Date(year, mon, 0).getDate();
            let endDay = (month > todayMonthStr) ? 0 : (month === todayMonthStr ? today.getDate() : lastDayOfMonth);
            const monthStart = `${month}-01`;
            let runningInventory = null;
            const priorDates = Object.keys(dailyPltLog).filter(d => d < monthStart).sort();
            if (priorDates.length) runningInventory = dailyPltLog[priorDates[priorDates.length - 1]];
            for (let day = 1; day <= endDay; day++) {
                const dStr = `${month}-${String(day).padStart(2,'0')}`;
                let outPlt = 0, inPlt = 0;
                logs.forEach(l => {
                    if (l.time && l.time.startsWith(dStr)) {
                        const type = String(l.type || '').toUpperCase();
                        const qty = Number(l.plt || 0) + (Number(l.pcs || 0) / 120);
                        if (type.includes('OUT')) outPlt += qty;
                        else if (type.includes('IN')) inPlt += qty;
                    }
                });
                if (dailyPltLog[dStr] !== undefined && dailyPltLog[dStr] !== null) {
                    runningInventory = dailyPltLog[dStr];
                } else if (runningInventory !== null) {
                    runningInventory = runningInventory + inPlt - outPlt;
                }
                if (manualStorageLog[dStr] !== undefined) {
                    series[dStr] = manualStorageLog[dStr];
                } else if (runningInventory !== null) {
                    series[dStr] = Math.ceil(runningInventory);
                }
            }
            return series;
        }

        function render() {
            const item = inventory[0] || { name: '-', plt: 0, pcs: 0, kpp: 0 };
            const basePlt = Math.ceil(((item.plt * 120) + (item.pcs || 0)) / 120);
            let billingPlt = basePlt;
            const todayStr = getFormattedDate();
            if (manualStorageLog[todayStr] !== undefined) billingPlt = manualStorageLog[todayStr];

            document.getElementById('inventoryTable').innerHTML = `
                <tr>
                    <td class="p-3 font-bold text-slate-700">${item.name}</td>
                    <td class="p-3 text-center font-bold text-indigo-600">${item.plt} PLT</td>
                    <td class="p-3 text-center font-bold text-purple-600">${item.pcs || 0} 개</td>
                    <td class="p-3 text-center"><span class="bg-amber-100 text-amber-800 px-3 py-1 rounded-full font-black text-xs border border-amber-200">${billingPlt} PLT</span></td>
                    <td class="p-3 text-center font-bold text-red-500">${item.kpp || 0} 개</td>
                </tr>
            `;

            const months = new Set([
                getFormattedDate().substring(0, 7),
                ...logs.map(l => l.time.substring(0, 7)),
                ...Object.keys(dailyPltLog).map(d => d.substring(0, 7)),
                ...Object.keys(manualStorageLog).map(d => d.substring(0, 7))
            ]);
            const sortedMonths = Array.from(months).sort().reverse();
            if (!sortedMonths.includes(currentMonth)) currentMonth = sortedMonths[0];
            document.getElementById('monthSelector').innerHTML = sortedMonths.map(m => `<option value="${m}" ${m===currentMonth?'selected':''}>${m.replace('-','년 ')}월</option>`).join('');
            
            document.getElementById('logTitleMonth').innerText = currentMonth;
            const filteredLogs = logs.filter(l => l.time.startsWith(currentMonth) && (!document.getElementById('searchDate').value || l.time.startsWith(document.getElementById('searchDate').value)));
            
            document.getElementById('logContainer').innerHTML = filteredLogs.length === 0 ? `<div class="p-4 text-center text-slate-400">내역 없음</div>` : filteredLogs.map((l) => {
                const isOut = l.type.includes('OUT');
                const borderColor = isOut ? (l.type==='OUT_COUPANG' ? 'border-indigo-400' : 'border-blue-400') : 'border-emerald-400';
                const textColor = isOut ? (l.type==='OUT_COUPANG' ? 'text-indigo-700' : 'text-blue-700') : 'text-emerald-700';
                return `
                <div class="p-3 bg-white border-l-4 ${borderColor} rounded shadow-sm">
                    <p class="font-bold ${textColor} text-sm">${l.text}</p>
                    <p class="text-xs text-slate-500 mt-1">${l.time} <span class="bg-indigo-50 text-indigo-600 px-1 rounded font-bold border border-indigo-100 ml-1">💰 ${(l.fee||0).toLocaleString()}원</span></p>
                    ${l.memo ? `<p class="text-xs text-red-600 bg-red-50 p-1.5 mt-2 rounded font-semibold">📝 ${l.memo}</p>` : ''}
                </div>
            `}).join('');

            let sFee = 0, iFee = 0, oFee = 0;
            const dailyStorage = buildDailyStorage(currentMonth);
            Object.keys(dailyStorage).forEach(d => { sFee += dailyStorage[d] * 900; });
            logs.forEach(l => { if(l.time.startsWith(currentMonth)) { if(l.type==='IN') iFee += l.fee; else oFee += l.fee; }});
            
            document.getElementById('monthlyStorageFee').innerText = sFee.toLocaleString();
            document.getElementById('monthlyInFee').innerText = iFee.toLocaleString();
            document.getElementById('monthlyOutFee').innerText = oFee.toLocaleString();
            document.getElementById('monthlyTotalRevenue').innerText = (sFee + iFee + oFee).toLocaleString();
            document.getElementById('todayPltBadge').innerText = `청구보관: ${billingPlt} PLT`;
        }

        function openStorageModal() {
            document.getElementById('modalTitle').innerText = `📦 보관료 상세`;
            document.querySelector('#detailModal thead').innerHTML = `<tr><th class="p-2 w-24">일자</th><th class="p-2 text-center">정산 파렛트</th><th class="p-2 text-right">보관료</th></tr>`;
            const dailyStorage = buildDailyStorage(currentMonth);
            const dates = Object.keys(dailyStorage).sort((a,b) => b.localeCompare(a));
            document.getElementById('modalBody').innerHTML = dates.map(d => {
                return `
                <tr class="border-b border-slate-100 hover:bg-slate-50">
                    <td class="p-2 text-slate-500 font-mono text-xs align-middle">${d.substring(5)}</td>
                    <td class="p-2 text-center align-middle"><span class="font-bold text-indigo-600">${dailyStorage[d]} PLT</span></td>
                    <td class="p-2 text-right font-bold text-slate-800 align-middle text-sm">${(dailyStorage[d]*900).toLocaleString()}원</td>
                </tr>
            `}).join('');
            document.getElementById('detailModal').style.display = 'flex';
        }

        function openInOutModal(type) {
            document.getElementById('modalTitle').innerText = type === 'IN' ? `📥 입고비 상세` : `🚚 출고비 상세`;
            document.querySelector('#detailModal thead').innerHTML = `<tr><th class="p-2">일시</th><th class="p-2">내용</th><th class="p-2 text-right">금액</th></tr>`;
            const filtered = logs.filter(l => l.time.startsWith(currentMonth) && (type === 'IN' ? l.type === 'IN' : l.type.includes('OUT')));
            document.getElementById('modalBody').innerHTML = filtered.length === 0 ? `<tr><td colspan="3" class="p-4 text-center text-slate-400">내역 없음</td></tr>` : filtered.map(l => `
                <tr><td class="p-2 text-slate-500 font-mono text-xs">${l.time.substring(5)}</td><td class="p-2 font-medium">${l.text.split('] ')[1] || l.text}</td><td class="p-2 text-right font-bold text-indigo-600">${(l.fee||0).toLocaleString()}원</td></tr>
            `).join('');
            document.getElementById('detailModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
    </script>
</body>
</html>
